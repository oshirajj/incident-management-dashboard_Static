<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incident Management Dashboard</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script defer src="assets/js/app.js"></script>
</head>
<body>
  <aside class="sidebar">
    <h2>IMD</h2>
    <nav>
      <a href="#dashboard" class="active">Dashboard</a>
      <a href="#incidents">Incidents</a>
      <a href="#reports">Reports</a>
    </nav>
  </aside>

  <main class="content">
    <header class="topbar">Enterprise Incident Management</header>

    <section id="dashboard" class="page active">
      <h1>Dashboard</h1>
      <div class="cards">
        <div class="card p1">P1<br><strong>2</strong></div>
        <div class="card p2">P2<br><strong>5</strong></div>
        <div class="card p3">P3<br><strong>11</strong></div>
        <div class="card p4">P4<br><strong>20</strong></div>
      </div>
    </section>

    <section id="incidents" class="page">
      <h1>Incidents</h1>
      <input type="text" placeholder="Search incidents..." class="search" />
      <table>
        <thead><tr><th>ID</th><th>Title</th><th>Priority</th><th>Status</th></tr></thead>
        <tbody>
          <tr><td>INC001</td><td>Login Issue</td><td class="p1">P1</td><td class="open">Open</td></tr>
          <tr><td>INC002</td><td>API Delay</td><td class="p2">P2</td><td class="investigating">Investigating</td></tr>
        </tbody>
      </table>
    </section>

    <section id="reports" class="page">
      <h1>Reports</h1>
      <p>Weekly SLA and MTTR reports will appear here.</p>
    </section>

  </main>
</body>
</html>
