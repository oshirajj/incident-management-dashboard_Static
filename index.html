<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incident Management Dashboard</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css" />
  <script defer src="assets/js/app.js"></script>
</head>

<body>
  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <span class="logo">IM</span>
        <span class="brand-text">Incident</span>
      </div>

      <nav class="nav">
        <a href="#dashboard" class="nav-link active">Dashboard</a>
        <a href="#incidents" class="nav-link">Incidents</a>
        <a href="#reports" class="nav-link">Reports</a>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="main">
      <header class="topbar">
        <h1>Enterprise Incident Management</h1>
      </header>

      <!-- Dashboard -->
      <section id="dashboard" class="page active">
        <h2 class="page-title">Overview</h2>

        <div class="kpi-grid">
          <div class="kpi-card p1">
            <span class="kpi-label">P1 Incidents</span>
            <span class="kpi-value">2</span>
          </div>
          <div class="kpi-card p2">
            <span class="kpi-label">P2 Incidents</span>
